services:
  e2e-postgres:
    image: postgres:16-alpine
    container_name: wexon-e2e-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: wexon_e2e
      POSTGRES_PASSWORD: wexon_e2e_dev_only
      POSTGRES_DB: wexon_e2e
    volumes:
      - wexon_e2e_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wexon_e2e -d wexon_e2e"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s

volumes:
  wexon_e2e_pgdata:
