name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    name: Typecheck, lint, unit, and build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Prisma 7 reads DIRECT_URL from prisma.config.ts even for client generation.
      # These URLs are placeholders only — this job must never connect to a real DB.
      # DB-backed tests run exclusively in the `db-tests` job against an ephemeral service.
      DIRECT_URL: postgresql://ci:ci@127.0.0.1:5432/wexon_ci
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/wexon_ci
      ADMIN_EMAILS: admin@wexon.test
      ADMIN_LOGIN_PASSWORD: ci-admin-password
      ADMIN_SESSION_SECRET: ci-admin-session-secret
      CUSTOMER_SESSION_SECRET: ci-customer-session-secret
      API_KEY_HASH_SECRET: ci-api-key-hash-secret
      WEXPAY_CREDENTIAL_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit tests (no DB)
        run: npm run test:unit

      - name: Build
        run: npm run build

  db-tests:
    name: DB-backed unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: wexon
          POSTGRES_PASSWORD: wexon
          POSTGRES_DB: wexon_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wexon -d wexon_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Isolated CI Postgres only — never repository secrets / Supabase / production.
      DATABASE_URL: postgresql://wexon:wexon@127.0.0.1:5432/wexon_test
      DIRECT_URL: postgresql://wexon:wexon@127.0.0.1:5432/wexon_test
      WEXON_ALLOW_LOCAL_DB_TESTS: "1"
      NODE_ENV: test
      # Explicitly unset deployment env so the local DB guard stays permissive.
      VERCEL_ENV: ""
      ADMIN_EMAILS: admin@wexon.test
      ADMIN_LOGIN_PASSWORD: ci-admin-password
      ADMIN_SESSION_SECRET: ci-admin-session-secret
      CUSTOMER_SESSION_SECRET: ci-customer-session-secret
      API_KEY_HASH_SECRET: ci-api-key-hash-secret
      WEXPAY_CREDENTIAL_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Apply migrations to ephemeral CI database
        run: npx prisma migrate deploy

      - name: Run DB-backed unit tests
        run: npm run test:unit:db
