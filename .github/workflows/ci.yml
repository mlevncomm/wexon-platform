name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    name: Typecheck, lint, and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Prisma 7 reads DIRECT_URL from prisma.config.ts even for client generation.
      # CI only validates compilation here; it does not connect to this database.
      DIRECT_URL: postgresql://ci:ci@localhost:5432/wexon_ci
      DATABASE_URL: postgresql://ci:ci@localhost:5432/wexon_ci
      ADMIN_EMAILS: admin@wexon.test
      ADMIN_LOGIN_PASSWORD: ci-admin-password
      ADMIN_SESSION_SECRET: ci-admin-session-secret
      CUSTOMER_SESSION_SECRET: ci-customer-session-secret
      API_KEY_HASH_SECRET: ci-api-key-hash-secret
      WEXPAY_CREDENTIAL_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
