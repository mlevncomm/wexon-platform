name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    name: Typecheck, lint, unit, and build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Prisma 7 reads DIRECT_URL from prisma.config.ts even for client generation.
      # These URLs are placeholders only — this job must never connect to a real DB.
      # DB-backed tests run exclusively in the `db-tests` job against an ephemeral service.
      DIRECT_URL: postgresql://ci:ci@127.0.0.1:5432/wexon_ci
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/wexon_ci
      ADMIN_EMAILS: admin@wexon.test
      ADMIN_LOGIN_PASSWORD: ci-admin-password
      ADMIN_SESSION_SECRET: ci-admin-session-secret
      CUSTOMER_SESSION_SECRET: ci-customer-session-secret
      API_KEY_HASH_SECRET: ci-api-key-hash-secret
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit tests (no DB)
        run: npm run test:unit

      - name: Build
        run: npm run build

  db-tests:
    name: DB-backed unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: wexon
          POSTGRES_PASSWORD: wexon
          POSTGRES_DB: wexon_e2e
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U wexon -d wexon_e2e"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Isolated CI Postgres only — never repository secrets / Supabase / production.
      DATABASE_URL: postgresql://wexon:wexon@127.0.0.1:5433/wexon_e2e
      DIRECT_URL: postgresql://wexon:wexon@127.0.0.1:5433/wexon_e2e
      WEXON_ALLOW_LOCAL_DB_TESTS: "1"
      WEXON_E2E_TARGET: isolated
      WEXON_E2E_CONFIRM_ISOLATED: "true"
      WEXON_EMAIL_PROVIDER: fake
      WEXPAY_PAYTR_ENABLE_API: "false"
      WEXPAY_PAYTR_ENABLE: "false"
      PAYTR_ENABLED: "false"
      NODE_ENV: test
      # Explicitly unset deployment env so the local DB guard stays permissive.
      VERCEL_ENV: ""
      ADMIN_EMAILS: admin@wexon.test
      ADMIN_LOGIN_PASSWORD: ci-admin-password
      ADMIN_SESSION_SECRET: ci-admin-session-secret
      CUSTOMER_SESSION_SECRET: ci-customer-session-secret
      API_KEY_HASH_SECRET: ci-api-key-hash-secret
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Ensure PostgREST roles exist before migrations
        # Migration REVOKE/GRANT blocks are conditional on these roles.
        # Creating them here lets CI measure real migration revoke state (no test-time REVOKE).
        run: |
          PGPASSWORD=wexon psql -h 127.0.0.1 -p 5433 -U wexon -d wexon_e2e -v ON_ERROR_STOP=1 <<'SQL'
          DO $$ BEGIN
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'anon') THEN
              CREATE ROLE anon NOLOGIN;
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'authenticated') THEN
              CREATE ROLE authenticated NOLOGIN;
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'wexon_app') THEN
              CREATE ROLE wexon_app NOLOGIN NOBYPASSRLS;
            END IF;
          END $$;
          SQL

      - name: Apply migrations to ephemeral CI database
        run: npx prisma migrate deploy

      - name: Seed ephemeral CI database
        run: npx prisma db seed

      - name: Run DB-backed unit tests
        run: npm run test:unit:db

  wexpay-isolated-e2e:
    name: WexPay isolated E2E
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Isolated Docker Postgres only — never repository secrets / Supabase / production.
    env:
      # Placeholders for prisma generate only; isolated runner replaces with local e2e DB.
      DIRECT_URL: postgresql://wexon_e2e:wexon_e2e_dev_only@127.0.0.1:5433/wexon_e2e
      DATABASE_URL: postgresql://wexon_e2e:wexon_e2e_dev_only@127.0.0.1:5433/wexon_e2e
      WEXON_ALLOW_LOCAL_DB_TESTS: "1"
      NODE_ENV: test
      VERCEL_ENV: ""
      ADMIN_EMAILS: admin@wexon.test
      ADMIN_LOGIN_PASSWORD: ci-admin-password
      ADMIN_SESSION_SECRET: ci-admin-session-secret
      CUSTOMER_SESSION_SECRET: ci-customer-session-secret
      API_KEY_HASH_SECRET: ci-api-key-hash-secret
      WEXPAY_PAYTR_ENABLE_API: "false"
      WEXPAY_PAYTR_ENABLE: "false"
      PAYTR_ENABLED: "false"
      NEXT_PUBLIC_APP_URL: http://localhost:3100
      SMOKE_PORT: "3100"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Run isolated WexPay E2E (twice)
        run: npm run test:e2e:wexpay-isolated
